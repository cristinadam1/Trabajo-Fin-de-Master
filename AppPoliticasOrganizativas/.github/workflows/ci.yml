name: Integración Continua (CI)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  construir-backend:
    name: Construir y Verificar Backend
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
      
      - name: Configurar entorno de Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Instalar librerías del backend
        working-directory: ./backend
        run: |
          pip install -r requirements.txt
      
      - name: Verificar sintaxis de archivos Python
        run: python -m py_compile backend/app/*.py

  construir-frontend:
    name: Construir y Verificar Frontend
    runs-on: ubuntu-latest
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
      
      - name: Configurar entorno de Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Instalar dependencias del frontend
        working-directory: ./frontend
        run: npm ci
      
      - name: Compilar proyecto frontend (Build)
        working-directory: ./frontend
        run: npm run build

  probar-docker:
    name: Verificar imágenes de Docker
    runs-on: ubuntu-latest
    needs: [construir-backend, construir-frontend]
    steps:
      - name: Descargar código del repositorio
        uses: actions/checkout@v4
      
      - name: Construir imagen Docker del Backend
        run: docker compose build backend
      
      - name: Construir imagen Docker del Frontend
        run: docker compose build frontend