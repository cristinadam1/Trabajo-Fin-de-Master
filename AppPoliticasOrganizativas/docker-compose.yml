#version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: app_politicas_db
    environment:
      POSTGRES_USER: cristina
      POSTGRES_PASSWORD: cristina123
      POSTGRES_DB: app_politicas
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cristina"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: app_politicas_backend
    environment:
      DATABASE_URL: postgresql://cristina:cristina123@db:5432/app_politicas
      LLM_API_URL: ${LLM_API_URL:-http://host.docker.internal:11434/api/generate}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_MODEL: ${LLM_MODEL:-llama3.2-abliterated}
      VERIFICADOR_URL: http://guardrail-api:8000
    ports:
      - "8001:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - default
      - guardrail_network

  frontend:
    build: ./frontend
    container_name: app_politicas_frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:8001
    restart: unless-stopped

networks:
  guardrail_network:
    external: true

volumes:
  postgres_data: